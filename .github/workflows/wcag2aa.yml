---
name: "WCAG 2.2 AA "
on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  test_accessibility:
    name: Test Accessibility
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@latest

      - name: Set up Ruby via mise
        uses: jdx/mise-action@v2

      - name: Cache bundled gems
        uses: actions/cache@v4
        with:
          path: docs/vendor/bundle
          key: ${{ runner.os }}-gems-docs-${{ hashFiles('docs/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-docs-

      - name: Install gems
        run: |
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Start server in the background
        run: |
          bundle exec jekyll serve --detach --no-watch --port 3000
        # sleep 5
        # curl http://127.0.0.1:3000/changelog.html -o changelog.html

      # - name: Upload built webpage
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: built-page
      #     path: changelog.html

      # Run Pa11y
      - name: Run accessibility tests
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          npx pa11y-ci --config .github/workflows/pa11y/wcag2aa.js
