---
name: "WCAG 2.1 AAA "
on:
  workflow_run:
    workflows:
      - "WCAG 2.1 AA "
    types:
      - completed

permissions: read-all

jobs:
  test_accessibility:
    name: Test Accessibility
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./docs
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@latest

      - name: Set up Ruby via mise
        uses: jdx/mise-action@v2

      - name: Cache bundled gems
        uses: actions/cache@v4
        with:
          path: docs/vendor/bundle
          key: ${{ runner.os }}-gems-docs-${{ hashFiles('docs/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-docs-

      - name: Install gems
        run: |
          bundle config set --local path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Start server in the background
        run: |
          bundle exec jekyll serve --detach --no-watch --port 3000
        # sleep 5
        # curl http://127.0.0.1:3000/changelog.html -o changelog.html

      # - name: Upload built webpage
      #   uses: actions/upload-artifact@v3
      #   with:
      #     name: built-page
      #     path: changelog.html

      # Run Pa11y
      - name: Run accessibility tests
        run: 'npx pa11y --debug --standard WCAG2AAA "http://127.0.0.1:3000/changelog.html"'  # DevSkim: ignore DS137138
